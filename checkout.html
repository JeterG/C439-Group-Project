<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>E-Grocery Checkout</title>

        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <script src="cart-data.js"></script>
        <script src="checkout.js" defer></script>
    </head>
    <body>
        <header>
            <nav
                class="navbar navbar-expand-lg bg-dark navbar-dark py-3 fixed-top"
            >
                <div class="container">
                    <a href="#" class="navbar-brand fw-bold">E-Grocery</a>

                    <button
                        class="navbar-toggler"
                        type="button"
                        data-bs-toggle="collapse"
                        data-bs-target="#navmenu"
                        aria-controls="navmenu"
                        aria-expanded="false"
                        aria-label="Toggle navigation"
                    >
                        <span class="navbar-toggler-icon"></span>
                    </button>

                    <div class="collapse navbar-collapse" id="navmenu">
                        <ul class="navbar-nav">
                            <li class="nav-item">
                                <a href="#" class="nav-link">Storefront</a>
                            </li>
                            <li class="nav-item">
                                <a href="#" class="nav-link">Search</a>
                            </li>
                            <li class="nav-item">
                                <a href="#" class="nav-link">About</a>
                            </li>
                        </ul>

                        <ul class="navbar-nav ms-auto">
                            <li class="nav-item">
                                <a href="cart.html" class="nav-link">Cart</a>
                            </li>
                            <li class="nav-item">
                                <a href="#" class="nav-link active">Checkout</a>
                            </li>
                            <li class="nav-item">
                                <a href="#" class="nav-link">Account</a>
                            </li>
                        </ul>
                    </div>
                </div>
            </nav>
        </header>

        <main class="container my-5">
            <div class="row g-4">
                <!-- Checkout Form -->
                <div class="col-lg-8">
                    <div class="cart-card p-4">
                        <h2 class="section-title mb-4">Checkout</h2>

                        <form>
                            <div class="mb-4">
                                <h5 class="mb-3">Contact Information</h5>
                                <div class="row g-3">
                                    <div class="col-md-6">
                                        <input
                                            type="text"
                                            class="form-control"
                                            placeholder="First name"
                                        />
                                    </div>
                                    <div class="col-md-6">
                                        <input
                                            type="text"
                                            class="form-control"
                                            placeholder="Last name"
                                        />
                                    </div>
                                    <div class="col-12">
                                        <input
                                            type="email"
                                            class="form-control"
                                            placeholder="Email address"
                                        />
                                    </div>
                                </div>
                            </div>

                            <div class="mb-4">
                                <h5 class="mb-3">Delivery Address</h5>
                                <div class="row g-3">
                                    <div class="col-12">
                                        <input
                                            type="text"
                                            class="form-control"
                                            placeholder="Street address"
                                        />
                                    </div>
                                    <div class="col-md-6">
                                        <input
                                            type="text"
                                            class="form-control"
                                            placeholder="City"
                                        />
                                    </div>
                                    <div class="col-md-3">
                                        <input
                                            type="text"
                                            class="form-control"
                                            placeholder="Province"
                                        />
                                    </div>
                                    <div class="col-md-3">
                                        <input
                                            type="text"
                                            class="form-control"
                                            placeholder="Postal code"
                                        />
                                    </div>
                                </div>
                            </div>

                            <div class="mb-4">
                                <h5 class="mb-3">Payment</h5>
                                <div class="row g-3">
                                    <div class="col-12">
                                        <input
                                            type="text"
                                            class="form-control"
                                            placeholder="Cardholder name"
                                        />
                                    </div>
                                    <div class="col-12">
                                        <input
                                            type="text"
                                            class="form-control"
                                            placeholder="Card number"
                                        />
                                    </div>
                                    <div class="col-md-6">
                                        <input
                                            type="text"
                                            class="form-control"
                                            placeholder="MM/YY"
                                        />
                                    </div>
                                    <div class="col-md-6">
                                        <input
                                            type="text"
                                            class="form-control"
                                            placeholder="CVV"
                                        />
                                    </div>
                                </div>
                            </div>

                            <div
                                class="d-flex justify-content-between flex-wrap gap-2"
                            >
                                <a href="#" class="btn btn-outline-secondary">
                                    Back to Cart
                                </a>
                                <button
                                    type="submit"
                                    class="btn btn-success px-4"
                                >
                                    Place Order
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- Order Summary -->
                <div class="col-lg-4">
                    <div class="summary-card p-4">
                        <h3 class="section-title mb-4">Order Summary</h3>

                        <div class="summary-row">
                            <span>Subtotal</span>
                            <span id="checkout-subtotal">$0.00</span>
                        </div>

                        <div class="summary-row">
                            <span>Delivery</span>
                            <span id="checkout-delivery">$0.00</span>
                        </div>

                        <div class="summary-row">
                            <span>Tax</span>
                            <span id="checkout-tax">$0.00</span>
                        </div>

                        <hr />

                        <div class="summary-row fw-bold fs-5">
                            <span>Total</span>
                            <span id="checkout-total">$0.00</span>
                        </div>

                        <p class="summary-note mt-3 mb-0 text-center">
                            Fast, secure, and simple checkout
                        </p>
                    </div>
                </div>
            </div>
        </main>
    </body>
</html>
