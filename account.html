<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.1/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-+0n0xVW2eSR5OomGNYDnhzAbDsOXxcvSN1TPprVMTNDbiYZCxYbOOl7+AMvyTG2x"
            crossorigin="anonymous"
        />
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
        <link rel="stylesheet" href="style.css" />
        <script src="account.js" defer></script>
        <title>Account</title>
    </head>
    <body>
        <!-- Navigation -->
        <nav class="navbar navbar-expand-lg bg-dark navbar-dark py-3 fixed-top">
            <div class="container">
                <a href="#" class="navbar-brand">E-Grocery</a>

                <button
                    class="navbar-toggler"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#navmenu"
                >
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="navmenu">
                    <!-- Left side -->
                    <ul class="navbar-nav">
                        <li class="nav-item">
                            <a href="#" class="nav-link">Storefront</a>
                        </li>
                        <li class="nav-item">
                            <a href="#" class="nav-link">Search</a>
                        </li>
                        <li class="nav-item">
                            <a href="contact.html" class="nav-link">About</a>
                        </li>
                    </ul>

                    <!-- Right side -->
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item">
                            <a href="#" class="nav-link">Cart</a>
                        </li>
                        <li class="nav-item">
                            <a href="#" class="nav-link">Checkout</a>
                        </li>
                        <li class="nav-item">
                            <a href="#" class="nav-link">Account</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>

        <!-- Login/Register -->
        <section id="accountLoginRegister" class="py-5">
            <div class="container">
                <div class="row">
                    <div class="col-md-6">
                        <h2>Login</h2>
                        <form id="loginForm" onsubmit="return validateLogin();">
                            <div class="mb-3">
                                <label for="loginEmail" class="form-label"
                                    >Email address</label
                                >
                                <input
                                    type="email"
                                    class="form-control"
                                    id="loginEmail"
                                    placeholder="Enter email"
                                />
                            </div>
                            <div class="mb-3">
                                <label for="loginPassword" class="form-label"
                                    >Password</label
                                >
                                <input
                                    type="password"
                                    class="form-control"
                                    id="loginPassword"
                                    placeholder="Password"
                                />
                            </div>
                            <button type="submit" class="btn btn-primary">
                                Login
                            </button>
                        </form>
                    </div>
                    <div class="col-md-6">
                        <h2>Register</h2>
                        <form
                            id="registerForm"
                            onsubmit="return validatePassword();"
                        >
                            <div class="mb-3">
                                <label for="registerEmail" class="form-label"
                                    >Email address</label
                                >
                                <input
                                    type="email"
                                    class="form-control"
                                    id="registerEmail"
                                    placeholder="Enter email"
                                />
                            </div>
                            <div class="mb-3">
                                <label for="registerPassword" class="form-label"
                                    >Password</label
                                >
                                <input
                                    type="password"
                                    class="form-control"
                                    id="registerPassword"
                                    placeholder="Password"
                                />
                            </div>
                            <div class="mb-3">
                                <label
                                    for="registerConfirmPassword"
                                    class="form-label"
                                    >Confirm Password</label
                                >
                                <input
                                    type="password"
                                    class="form-control"
                                    id="registerConfirmPassword"
                                    placeholder="Confirm Password"
                                />
                            </div>
                            <button type="submit" class="btn btn-success">
                                Register
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </section>

        <!-- Account Page -->
        <div id="accountSection" class="d-none py-5">
            <div class="container">
                <h1 id="accountWelcome">Welcome, ${email}!</h1>
                <p>
                    This is your account page. Here you can view your order
                    history, manage your account settings, and more.
                </p>

                <div class="container">
                    <h2>Account Information</h2>
                    <p>Email: <span id="accountEmail"></span></p>
                    <div class="card mb-3">
                        <div class="card-header">Order History</div>
                        <div class="card-body">
                            <ul id="orderHistory" class="list-group">
                                <!-- Orders will be injected here -->
                            </ul>
                        </div>
                    </div>
                    <button class="btn btn-danger" onclick="logout()">
                        Logout
                    </button>
                </div>
            </div>
        </div>
    </body>
</html>
