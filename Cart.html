<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>E-Grocery Cart</title>

        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="css/custom.css" />

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    </head>
    <body>
        <header>
            <nav
                class="navbar navbar-expand-lg bg-dark navbar-dark py-3 fixed-top"
            >
                <div class="container">
                    <a href="#" class="navbar-brand fw-bold">E-Grocery</a>

                    <button
                        class="navbar-toggler"
                        type="button"
                        data-bs-toggle="collapse"
                        data-bs-target="#navmenu"
                        aria-controls="navmenu"
                        aria-expanded="false"
                        aria-label="Toggle navigation"
                    >
                        <span class="navbar-toggler-icon"></span>
                    </button>

                    <div class="collapse navbar-collapse" id="navmenu">
                        <ul class="navbar-nav">
                            <li class="nav-item">
                                <a href="#" class="nav-link">Storefront</a>
                            </li>
                            <li class="nav-item">
                                <a href="#" class="nav-link">Search</a>
                            </li>
                            <li class="nav-item">
                                <a href="#" class="nav-link">About</a>
                            </li>
                        </ul>

                        <ul class="navbar-nav ms-auto">
                            <li class="nav-item">
                                <a href="#" class="nav-link active">Cart</a>
                            </li>
                            <li class="nav-item">
                                <a href="#" class="nav-link">Checkout</a>
                            </li>
                            <li class="nav-item">
                                <a href="#" class="nav-link">Account</a>
                            </li>
                        </ul>
                    </div>
                </div>
            </nav>
        </header>

        <main class="container my-5">
            <div class="row g-4">
                <!--Cart Items-->
                <div class="col-lg-8">
                    <div class="cart-card p-4">
                        <div
                            class="d-flex justify-content-between align-items-center mb-4"
                        >
                            <h2 class="section-title mb-0">Your Cart</h2>
                            <span class="text-muted" id="cart-count"
                                >0 items</span
                            >
                        </div>

                        <!-- JS will insert cart items here -->
                        <div id="cart-items-container">
                            <div class="empty-cart-message text-center py-5">
                                <h5>Your cart is empty</h5>
                                <p class="text-muted mb-0">
                                    Items added with JavaScript will appear
                                    here.
                                </p>
                            </div>
                        </div>

                        <div
                            class="mt-4 d-flex justify-content-between flex-wrap gap-2"
                        >
                            <a href="#" class="btn btn-outline-secondary"
                                >Continue Shopping</a
                            >
                            <button
                                class="btn btn-outline-danger"
                                id="clear-cart-btn"
                            >
                                Clear Cart
                            </button>
                        </div>
                    </div>
                </div>

                <!--Order Summary-->
                <div class="col-lg-4">
                    <div class="summary-card p-4">
                        <h3 class="section-title mb-4">Order Summary</h3>

                        <div class="summary-row">
                            <span>Subtotal</span>
                            <span id="cart-subtotal">$0.00</span>
                        </div>

                        <div class="summary-row">
                            <span>Delivery</span>
                            <span id="cart-delivery">$0.00</span>
                        </div>

                        <div class="summary-row">
                            <span>Tax</span>
                            <span id="cart-tax">$0.00</span>
                        </div>

                        <hr />

                        <div class="summary-row fw-bold fs-5">
                            <span>Total</span>
                            <span id="cart-total">$0.00</span>
                        </div>

                        <div class="input-group my-4">
                            <input
                                type="text"
                                class="form-control"
                                placeholder="Promo code"
                                id="promo-code"
                            />
                            <button
                                class="btn btn-success"
                                id="apply-promo-btn"
                            >
                                Apply
                            </button>
                        </div>

                        <button
                            class="btn btn-success w-100 py-2 mb-3"
                            id="checkout-btn"
                        >
                            Proceed to Checkout
                        </button>
                        <p class="summary-note mb-0 text-center">
                            Secure checkout with card or online payment
                        </p>
                    </div>
                </div>
            </div>
        </main>
    </body>
</html>
